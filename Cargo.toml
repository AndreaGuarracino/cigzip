[package]
name = "cigzip"
version = "0.1.0"
edition = "2021"
authors = ["Andrea Guarracino <aguarracino@tgen.org>"]

[dependencies]
clap = { version = "4.5", features = ["derive"] }
rust-htslib = { version = "1.0.0", default-features = false, features = ["libdeflate"] }
flate2 = "1.1"
log = "0.4"
env_logger = "0.11"
rayon = "1.10"
indicatif="0.18"

# Dependencies for AGC format (for sequences) support
ragc-core = { git = "https://github.com/ekg/ragc", rev = "40e5cad" }

#lib_wfa2 = { path = "/home/guarracino/Dropbox/git/lib_wfa2"}
lib_wfa2 = { git = "https://github.com/AndreaGuarracino/lib_wfa2", rev = "8859b6a214141968f37d9bcb22552408318adda0" }
#tracepoints = { path = "/Users/hasitha/Documents/biology/lib_tracepoints"}
tracepoints = { git = "https://github.com/chris7716/lib_tracepoints", rev = "0728c3a5aa41d4a0bcd00686d80170722f8bc251" }
#tpa = { path = "/Users/hasitha/Documents/biology/tpa" }
tpa = { git = "https://github.com/chris7716/tpa", rev = "dc72bcc9f01a634de456ccbc40878cef254a8437" }

[features]
default = []

[patch."https://github.com/AndreaGuarracino/tracepoints"]
tracepoints = { git = "https://github.com/chris7716/lib_tracepoints", rev = "0728c3a5aa41d4a0bcd00686d80170722f8bc251" }
